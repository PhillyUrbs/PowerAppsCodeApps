name: Deploy Code App to Dev

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "App folder name to deploy (from apps/ directory)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate app exists
        run: |
          if [ ! -d "apps/${{ inputs.app-name }}" ]; then
            echo "::error::App '${{ inputs.app-name }}' not found in apps/ directory"
            echo "Available apps:"
            ls -1 apps/
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/${{ inputs.app-name }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ inputs.app-name }}
        run: npm ci

      - name: Build
        working-directory: apps/${{ inputs.app-name }}
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Cache Power Platform CLI
        id: cache-pac
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: pac-cli-${{ runner.os }}

      - name: Install Power Platform CLI
        if: steps.cache-pac.outputs.cache-hit != 'true'
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate to Power Platform
        run: |
          pac auth clear
          pac auth create \
            --environment "${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}" \
            --applicationId "${{ secrets.POWER_PLATFORM_CLIENT_ID }}" \
            --clientSecret "${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}" \
            --tenant "${{ secrets.POWER_PLATFORM_TENANT_ID }}" \
            --accept-cleartext-caching

      - name: Initialize or update Code App
        working-directory: apps/${{ inputs.app-name }}
        run: |
          DISPLAY_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/ /g' | sed 's/\b./\u&/g')

          # Check if app already exists by looking for appId in power.config.json
          if [ -f power.config.json ] && jq -e '.appId' power.config.json > /dev/null 2>&1; then
            echo "App already initialized (appId found in power.config.json)"
            cat power.config.json
          else
            # Check if an app with this name already exists in the environment
            EXISTING=$(pac code list 2>&1 | grep "$DISPLAY_NAME" | head -1 || true)
            if [ -n "$EXISTING" ]; then
              echo "App '$DISPLAY_NAME' already exists in environment, extracting ID..."
              EXISTING_ID=$(echo "$EXISTING" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
              echo "Found existing app ID: $EXISTING_ID"

              # Generate power.config.json with the existing appId
              jq -n \
                --arg appId "$EXISTING_ID" \
                --arg displayName "$DISPLAY_NAME" \
                --arg envId "${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}" \
                '{
                  version: "1.0",
                  appId: $appId,
                  appDisplayName: $displayName,
                  region: "prod",
                  environmentId: $envId,
                  description: "",
                  buildPath: "./dist",
                  buildEntryPoint: "index.html",
                  localAppUrl: "http://localhost:3000",
                  logoPath: "Default",
                  connectionReferences: {},
                  databaseReferences: {}
                }' > power.config.json
            else
              echo "Initializing new app '$DISPLAY_NAME'..."
              pac code init --displayName "$DISPLAY_NAME"
            fi
            echo "power.config.json:"
            cat power.config.json
          fi

      - name: Deploy to Power Platform
        id: deploy
        working-directory: apps/${{ inputs.app-name }}
        run: |
          SOLUTION_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/_/g')
          pac code push --solutionName "$SOLUTION_NAME" | tee deploy-output.txt

          # Extract app ID from power.config.json (pac code push updates it) or from output
          APP_ID=$(jq -r '.appId // empty' power.config.json 2>/dev/null || true)
          if [ -z "$APP_ID" ]; then
            APP_ID=$(grep -oP '/app/\K[0-9a-f-]+' deploy-output.txt || true)
          fi
          echo "app-id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed app ID: $APP_ID"

      - name: Add app to solution
        if: steps.deploy.outputs.app-id != ''
        run: |
          SOLUTION_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/_/g')
          APP_ID="${{ steps.deploy.outputs.app-id }}"

          echo "Adding app $APP_ID to solution $SOLUTION_NAME..."
          pac solution add-solution-component \
            --solutionUniqueName "$SOLUTION_NAME" \
            --component "$APP_ID" \
            --componentType 300 \
            2>&1 || echo "::warning::Could not add app to solution automatically"

      - name: Share app with admin account
        if: steps.deploy.outputs.app-id != ''
        env:
          ADMIN_USER_EMAIL: ${{ secrets.POWER_PLATFORM_ADMIN_EMAIL }}
          APP_ID: ${{ steps.deploy.outputs.app-id }}
          ENV_ID: ${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}
          CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
        run: |
          if [ -z "$ADMIN_USER_EMAIL" ]; then
            echo "::warning::POWER_PLATFORM_ADMIN_EMAIL not set, skipping app sharing"
            exit 0
          fi

          # Get access token for Power Apps API
          TOKEN=$(curl -s -X POST "https://login.microsoftonline.com/$TENANT_ID/oauth2/v2.0/token" \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "scope=https://service.powerapps.com/.default" \
            -d "grant_type=client_credentials" | jq -r '.access_token')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "::warning::Failed to get access token for Power Apps API"
            exit 0
          fi

          echo "Sharing app $APP_ID with $ADMIN_USER_EMAIL as co-owner..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.powerapps.com/providers/Microsoft.PowerApps/apps/$APP_ID/modifyPermissions?api-version=2016-11-01&\$filter=environment%20eq%20'$ENV_ID'" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"put\": [{
                \"properties\": {
                  \"roleName\": \"CanEdit\",
                  \"NotifyShareTargetOption\": \"DoNotNotify\",
                  \"principal\": {
                    \"email\": \"$ADMIN_USER_EMAIL\",
                    \"tenantId\": \"$TENANT_ID\",
                    \"type\": \"User\"
                  }
                }
              }]
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "App shared successfully with $ADMIN_USER_EMAIL"
          else
            echo "::warning::Failed to share app (HTTP $HTTP_CODE): $BODY"
          fi

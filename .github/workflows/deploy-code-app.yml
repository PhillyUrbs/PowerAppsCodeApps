name: Deploy Code App to Dev

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "App folder name to deploy (from apps/ directory)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate app exists
        run: |
          if [ ! -d "apps/${{ inputs.app-name }}" ]; then
            echo "::error::App '${{ inputs.app-name }}' not found in apps/ directory"
            echo "Available apps:"
            ls -1 apps/
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/${{ inputs.app-name }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ inputs.app-name }}
        run: npm ci

      - name: Build
        working-directory: apps/${{ inputs.app-name }}
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Cache Power Platform CLI
        id: cache-pac
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: pac-cli-${{ runner.os }}

      - name: Install Power Platform CLI
        if: steps.cache-pac.outputs.cache-hit != 'true'
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate to Power Platform
        run: |
          pac auth clear
          pac auth create \
            --environment "${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}" \
            --applicationId "${{ secrets.POWER_PLATFORM_CLIENT_ID }}" \
            --clientSecret "${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}" \
            --tenant "${{ secrets.POWER_PLATFORM_TENANT_ID }}" \
            --accept-cleartext-caching

      - name: Generate power.config.json
        working-directory: apps/${{ inputs.app-name }}
        env:
          ENVIRONMENT_ID: ${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}
        run: |
          # Convert folder name to display name (roadmap-calendar → Roadmap Calendar)
          DISPLAY_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/ /g' | sed 's/\b./\u&/g')

          jq -n \
            --arg displayName "$DISPLAY_NAME" \
            --arg envId "$ENVIRONMENT_ID" \
            '{
              version: "1.0",
              appDisplayName: $displayName,
              region: "prod",
              environmentId: $envId,
              description: "",
              buildPath: "./dist",
              buildEntryPoint: "index.html",
              localAppUrl: "http://localhost:3000",
              logoPath: "Default",
              connectionReferences: {},
              databaseReferences: {}
            }' > power.config.json

          echo "Generated power.config.json:"
          cat power.config.json

      - name: Deploy to Power Platform
        id: deploy
        working-directory: apps/${{ inputs.app-name }}
        run: |
          # Solution name uses the app folder name (hyphens replaced with underscores)
          SOLUTION_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/_/g')
          OUTPUT=$(pac code push --solutionName "$SOLUTION_NAME" 2>&1) || true
          echo "$OUTPUT"

          # Check for "name already in use" error and extract the existing app ID
          EXISTING_ID=$(echo "$OUTPUT" | grep -oP "Existing App: '\K[0-9a-f-]+" || true)
          if [ -n "$EXISTING_ID" ]; then
            echo "App already exists ($EXISTING_ID), updating power.config.json and retrying..."
            jq --arg appId "$EXISTING_ID" '. + {appId: $appId}' power.config.json > tmp.json && mv tmp.json power.config.json
            OUTPUT=$(pac code push --solutionName "$SOLUTION_NAME" 2>&1)
            echo "$OUTPUT"
          fi

          # Extract app ID from the play URL in the output
          APP_ID=$(echo "$OUTPUT" | grep -oP '/app/\K[0-9a-f-]+' || true)
          if [ -z "$APP_ID" ] && [ -n "$EXISTING_ID" ]; then
            APP_ID="$EXISTING_ID"
          fi
          echo "app-id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Share app with admin account
        working-directory: apps/${{ inputs.app-name }}
        env:
          ADMIN_USER_EMAIL: ${{ secrets.POWER_PLATFORM_ADMIN_EMAIL }}
          APP_ID: ${{ steps.deploy.outputs.app-id }}
        run: |
          if [ -n "$APP_ID" ] && [ -n "$ADMIN_USER_EMAIL" ]; then
            echo "Sharing app $APP_ID with $ADMIN_USER_EMAIL as co-owner..."
            pac canvas share --id "$APP_ID" --email "$ADMIN_USER_EMAIL" --role CanEdit
          else
            echo "::warning::Skipping app sharing — app ID not captured or POWER_PLATFORM_ADMIN_EMAIL not set"
          fi

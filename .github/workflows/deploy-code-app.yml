name: Deploy Code App to Dev

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "App folder name to deploy (from apps/ directory)"
        required: true
        type: string
      auth-method:
        description: "Authentication method (url = Dataverse URL, environment-id = Environment GUID)"
        required: true
        type: choice
        default: url
        options:
          - url
          - environment-id

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate app exists
        run: |
          if [ ! -d "apps/${{ inputs.app-name }}" ]; then
            echo "::error::App '${{ inputs.app-name }}' not found in apps/ directory"
            echo "Available apps:"
            ls -1 apps/
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/${{ inputs.app-name }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ inputs.app-name }}
        run: npm ci

      - name: Build
        working-directory: apps/${{ inputs.app-name }}
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Cache Power Platform CLI
        id: cache-pac
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: pac-cli-${{ runner.os }}

      - name: Install Power Platform CLI
        if: steps.cache-pac.outputs.cache-hit != 'true'
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate to Power Platform (URL)
        if: inputs.auth-method == 'url'
        run: |
          pac auth clear
          pac auth create \
            --url "${{ secrets.POWER_PLATFORM_URL }}" \
            --applicationId "${{ secrets.POWER_PLATFORM_CLIENT_ID }}" \
            --clientSecret "${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}" \
            --tenant "${{ secrets.POWER_PLATFORM_TENANT_ID }}" \
            --accept-cleartext-caching

      - name: Authenticate to Power Platform (Environment ID)
        if: inputs.auth-method == 'environment-id'
        run: |
          pac auth clear
          pac auth create \
            --environment "${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}" \
            --applicationId "${{ secrets.POWER_PLATFORM_CLIENT_ID }}" \
            --clientSecret "${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}" \
            --tenant "${{ secrets.POWER_PLATFORM_TENANT_ID }}" \
            --accept-cleartext-caching

      - name: Initialize Code App
        working-directory: apps/${{ inputs.app-name }}
        run: |
          # Convert folder name to display name (roadmap-calendar → Roadmap Calendar)
          DISPLAY_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/ /g' | sed 's/\b./\u&/g')
          pac code init --displayName "$DISPLAY_NAME"

      - name: Deploy to Power Platform
        working-directory: apps/${{ inputs.app-name }}
        run: |
          # Solution name uses the app folder name (hyphens replaced with underscores)
          SOLUTION_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/_/g')
          pac code push --solutionName "$SOLUTION_NAME"

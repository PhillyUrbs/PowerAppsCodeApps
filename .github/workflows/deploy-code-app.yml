name: Deploy Code App to Dev

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "App folder name to deploy (from apps/ directory)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate app exists
        run: |
          if [ ! -d "apps/${{ inputs.app-name }}" ]; then
            echo "::error::App '${{ inputs.app-name }}' not found in apps/ directory"
            echo "Available apps:"
            ls -1 apps/
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/${{ inputs.app-name }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ inputs.app-name }}
        run: npm ci

      - name: Build
        working-directory: apps/${{ inputs.app-name }}
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Cache Power Platform CLI
        id: cache-pac
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: pac-cli-${{ runner.os }}

      - name: Install Power Platform CLI
        if: steps.cache-pac.outputs.cache-hit != 'true'
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate to Power Platform
        run: |
          pac auth clear
          pac auth create \
            --environment "${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}" \
            --applicationId "${{ secrets.POWER_PLATFORM_CLIENT_ID }}" \
            --clientSecret "${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}" \
            --tenant "${{ secrets.POWER_PLATFORM_TENANT_ID }}" \
            --accept-cleartext-caching

      - name: Generate power.config.json
        working-directory: apps/${{ inputs.app-name }}
        env:
          ENVIRONMENT_ID: ${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}
        run: |
          # Convert folder name to display name (roadmap-calendar → Roadmap Calendar)
          DISPLAY_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/ /g' | sed 's/\b./\u&/g')

          jq -n \
            --arg displayName "$DISPLAY_NAME" \
            --arg envId "$ENVIRONMENT_ID" \
            '{
              version: "1.0",
              appDisplayName: $displayName,
              region: "prod",
              environmentId: $envId,
              description: "",
              buildPath: "./dist",
              buildEntryPoint: "index.html",
              localAppUrl: "http://localhost:3000",
              logoPath: "Default",
              connectionReferences: {},
              databaseReferences: {}
            }' > power.config.json

          echo "Generated power.config.json:"
          cat power.config.json

      - name: Create solution if needed
        env:
          CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
        run: |
          SOLUTION_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/_/g')
          DISPLAY_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/ /g' | sed 's/\b./\u&/g')

          # Check if solution already exists
          if pac solution list | grep -q "$SOLUTION_NAME"; then
            echo "Solution '$SOLUTION_NAME' already exists"
          else
            echo "Creating solution '$SOLUTION_NAME' in Dataverse..."

            # Get the Dataverse URL from pac auth
            DATAVERSE_URL=$(pac auth list 2>&1 | grep -oP 'https://[^\s/]+\.crm\.dynamics\.com' | head -1)

            # Get access token for Dataverse
            TOKEN=$(curl -s -X POST "https://login.microsoftonline.com/$TENANT_ID/oauth2/v2.0/token" \
              -d "client_id=$CLIENT_ID" \
              -d "client_secret=$CLIENT_SECRET" \
              -d "scope=${DATAVERSE_URL}/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')

            # Get default publisher ID
            PUBLISHER_ID=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json" \
              "${DATAVERSE_URL}/api/data/v9.2/publishers?\$filter=uniquename%20eq%20'CDS%20Default%20Publisher'" \
              | jq -r '.value[0].publisherid')

            if [ "$PUBLISHER_ID" = "null" ] || [ -z "$PUBLISHER_ID" ]; then
              echo "::warning::Could not find default publisher, using Default Publisher ID"
              PUBLISHER_ID="d21aab71-79e7-11dd-8874-00188b01e34f"
            fi

            # Create the solution
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${DATAVERSE_URL}/api/data/v9.2/solutions" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"uniquename\": \"$SOLUTION_NAME\",
                \"friendlyname\": \"$DISPLAY_NAME\",
                \"version\": \"1.0.0.0\",
                \"publisherid@odata.bind\": \"publishers($PUBLISHER_ID)\"
              }")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Solution '$SOLUTION_NAME' created successfully"
            else
              BODY=$(echo "$RESPONSE" | sed '$d')
              echo "::warning::Failed to create solution (HTTP $HTTP_CODE): $BODY"
            fi
          fi

      - name: Deploy to Power Platform
        id: deploy
        working-directory: apps/${{ inputs.app-name }}
        run: |
          SOLUTION_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/_/g')
          pac code push --solutionName "$SOLUTION_NAME" | tee deploy-output.txt

          # Extract app ID from the play URL in the output
          APP_ID=$(grep -oP '/app/\K[0-9a-f-]+' deploy-output.txt || true)
          echo "app-id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Add app to solution
        if: steps.deploy.outputs.app-id != ''
        env:
          APP_ID: ${{ steps.deploy.outputs.app-id }}
          CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
        run: |
          SOLUTION_NAME=$(echo "${{ inputs.app-name }}" | sed 's/-/_/g')
          DATAVERSE_URL=$(pac auth list 2>&1 | grep -oP 'https://[^\s/]+\.crm\.dynamics\.com' | head -1)

          TOKEN=$(curl -s -X POST "https://login.microsoftonline.com/$TENANT_ID/oauth2/v2.0/token" \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "scope=${DATAVERSE_URL}/.default" \
            -d "grant_type=client_credentials" | jq -r '.access_token')

          # Try multiple component types: 300 (CanvasApp), 109 (PluginAssembly reused for code), and check powerpagecomponent
          # First, search for the app across multiple Dataverse tables to find what entity type it is
          echo "Searching for app $APP_ID across Dataverse tables..."

          # Check canvasapps
          CANVAS_RESULT=$(curl -s -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "${DATAVERSE_URL}/api/data/v9.2/canvasapps?\$filter=canvasappid%20eq%20${APP_ID}&\$select=canvasappid,displayname" \
            | jq -r '.value | length')

          # Check powerpagecomponents (code apps might be here)
          PPAGE_RESULT=$(curl -s -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "${DATAVERSE_URL}/api/data/v9.2/powerpagecomponents?\$filter=powerpagecomponentid%20eq%20${APP_ID}&\$select=powerpagecomponentid,name" \
            2>/dev/null | jq -r '.value | length' 2>/dev/null || echo "0")

          echo "Canvas matches: $CANVAS_RESULT, PowerPage matches: $PPAGE_RESULT"

          # Try pac solution add-solution-component which might handle code apps
          echo "Attempting to add via pac solution add-solution-component..."
          pac solution add-solution-component \
            --solutionUniqueName "$SOLUTION_NAME" \
            --component "$APP_ID" \
            --componentType 300 \
            2>&1 || true

          # Verify if component was added
          echo "Checking solution components..."
          pac solution list-components --solution-unique-name "$SOLUTION_NAME" 2>&1 || true

      - name: Share app with admin account
        if: steps.deploy.outputs.app-id != ''
        env:
          ADMIN_USER_EMAIL: ${{ secrets.POWER_PLATFORM_ADMIN_EMAIL }}
          APP_ID: ${{ steps.deploy.outputs.app-id }}
          ENV_ID: ${{ secrets.POWER_PLATFORM_ENVIRONMENT_ID }}
          CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
        run: |
          if [ -z "$ADMIN_USER_EMAIL" ]; then
            echo "::warning::POWER_PLATFORM_ADMIN_EMAIL not set, skipping app sharing"
            exit 0
          fi

          # Get access token for Power Apps API
          TOKEN=$(curl -s -X POST "https://login.microsoftonline.com/$TENANT_ID/oauth2/v2.0/token" \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "scope=https://service.powerapps.com/.default" \
            -d "grant_type=client_credentials" | jq -r '.access_token')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "::warning::Failed to get access token for Power Apps API"
            exit 0
          fi

          echo "Sharing app $APP_ID with $ADMIN_USER_EMAIL as co-owner..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.powerapps.com/providers/Microsoft.PowerApps/apps/$APP_ID/modifyPermissions?api-version=2016-11-01&\$filter=environment%20eq%20'$ENV_ID'" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"put\": [{
                \"properties\": {
                  \"roleName\": \"CanEdit\",
                  \"NotifyShareTargetOption\": \"DoNotNotify\",
                  \"principal\": {
                    \"email\": \"$ADMIN_USER_EMAIL\",
                    \"tenantId\": \"$TENANT_ID\",
                    \"type\": \"User\"
                  }
                }
              }]
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "App shared successfully with $ADMIN_USER_EMAIL"
          else
            echo "::warning::Failed to share app (HTTP $HTTP_CODE): $BODY"
          fi
